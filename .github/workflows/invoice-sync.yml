name: Sync bvod.by Invoices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync new invoices
        env:
          AI_API_URL: ${{ secrets.AI_API_URL }}
          INVOICE_SYNC_SECRET: ${{ secrets.INVOICE_SYNC_SECRET }}
        run: |
          HTTP_CODE=$(curl -sS -L --connect-timeout 15 --max-time 60 -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST "${AI_API_URL}/api/invoices/sync?async=1" \
            -H "X-Sync-Secret: ${INVOICE_SYNC_SECRET}" \
            -H "Content-Type: application/json")

          BODY=$(cat /tmp/sync_response.json)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Sync start failed with HTTP $HTTP_CODE"
            exit 1
          fi

          STARTED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('started', False)).lower())" 2>/dev/null || echo "false")
          IN_PROGRESS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('inProgress', False)).lower())" 2>/dev/null || echo "false")
          MODE=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('mode','incremental'))" 2>/dev/null || echo "incremental")

          echo "Sync accepted: mode=$MODE, started=$STARTED, inProgress=$IN_PROGRESS"