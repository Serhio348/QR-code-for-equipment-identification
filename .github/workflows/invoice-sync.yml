name: Sync bvod.by Invoices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync new invoices
        env:
          AI_API_URL: ${{ secrets.AI_API_URL }}
          INVOICE_SYNC_SECRET: ${{ secrets.INVOICE_SYNC_SECRET }}
        run: |
          HTTP_CODE=$(curl -s -L -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST "${AI_API_URL}/api/invoices/sync" \
            -H "X-Sync-Secret: ${INVOICE_SYNC_SECRET}" \
            -H "Content-Type: application/json")

          BODY=$(cat /tmp/sync_response.json)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

          SAVED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('saved',0))" 2>/dev/null || echo "0")
          SKIPPED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped',0))" 2>/dev/null || echo "0")
          ERRORS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('errors',[])))" 2>/dev/null || echo "0")

          echo "Sync complete: saved=$SAVED, skipped=$SKIPPED, errors=$ERRORS"